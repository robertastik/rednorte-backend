syntax = "proto3";
package com.example.demo.proto;

option java_package = "com.example.demo.model";
option java_outer_classname = "EntradaListaEsperaProtos";

enum EstadoListaEspera {
    PENDIENTE = 0;
    ASIGNADO = 1;
    CANCELADO = 2;
    ATENDIDO = 3;
}

message EntradaListaEspera {
    int64 id = 1;
    int64 paciente_id = 2;
    int64 especialidad_id = 3;
    int64 doctor_id = 4;
    string fecha_registro = 5;
    string fecha_estimada_atencion = 6;
    EstadoListaEspera estado = 7;
    int32 puntaje_prioridad = 8;
    string notas_clinicas = 9;
}

message ListaEntradas {
    repeated EntradaListaEspera entradas = 1;
}