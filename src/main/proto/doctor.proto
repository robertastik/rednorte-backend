syntax = "proto3";
package com.example.demo.proto;

option java_package = "com.example.demo.model";
option java_outer_classname = "DoctorProtos";

message Doctor {
    int64 id = 1;
    string nombre_completo = 2;
    string numero_licencia = 3;
    bool disponible = 4;
    MedicalSpecialty especialidad = 5;
}

message DoctorList {
    repeated Doctor doctors = 1;
}

message EspecialidadMedica {
    int64 id = 1;
    string nombre = 2;
    string codigo = 3;
}