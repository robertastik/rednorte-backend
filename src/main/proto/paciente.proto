syntax = "proto3";
package com.example.demo.proto;

option java_package = "com.example.demo.model";
option java_outer_classname = "PacienteProtos";

message Paciente {
    int64 id = 1;
    string rut = 2;
    string nombre_completo = 3;
    string fecha_nacimiento = 4;
    string email = 5;
    string telefono = 6;
    string sistema_salud = 7;
}

message PacienteList {
    repeated Paciente pacientes = 1;
}