syntax = "proto3";
package com.example.demo.proto;

option java_package = "com.example.demo.model";
option java_outer_classname = "EspecialidadMedicaProtos";

message EspecialidadMedica {
    int64 id = 1;
    string nombre = 2;
    string codigo = 3;
    int32 dias_espera_promedio = 4;
}

message EspecialidadMedicaList {
    repeated EspecialidadMedica especialidades = 1;
}