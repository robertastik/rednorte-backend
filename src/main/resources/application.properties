spring.application.name=hospital-waiting-list

# ─── Servidor ─────────────────────────────────────────────
server.port=8080

# ─── Conexión a Base de Datos (PostgreSQL en Docker) ──────
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_db
spring.datasource.username=hospital_user
spring.datasource.password=hospital_pass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── Kafka - Productor ────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ─── Kafka - Consumidor ───────────────────────────────────
spring.kafka.consumer.group-id=hospital-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ─── HikariCP ─────────────────────────────────────────────
spring.datasource.hikari.minimum-idle=5
# Tiempo máximo que Spring esperará por una conexión antes de dar error
spring.datasource.hikari.connection-timeout=10000
# Tiempo máximo que una conexión puede estar inactiva en el pool
spring.datasource.hikari.idle-timeout=600000
# Vida máxima de una conexión (evita conexiones zombis)
spring.datasource.hikari.max-lifetime=1800000
# Número máximo de conexiones abiertas
spring.datasource.hikari.maximum-pool-size=10

# ─── Kafka Listener ───────────────────────────────────────
spring.kafka.listener.concurrency=3
spring.kafka.producer.acks=all

# ─── Retry: reintenta 3 veces si PostgreSQL no responde ───
resilience4j.retry.instances.dbHospital.maxAttempts=3
resilience4j.retry.instances.dbHospital.waitDuration=1s

# ─── Circuit Breaker: abre si el 50% de llamadas fallan ───
resilience4j.circuitbreaker.instances.dbHospital.slidingWindowSize=6
resilience4j.circuitbreaker.instances.dbHospital.failureRateThreshold=50
resilience4j.circuitbreaker.instances.dbHospital.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.dbHospital.registerHealthIndicator=true

# ─── OAuth2 / Auth0 ───────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-robgo.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://api-demo-auth0/

# ─── Kafka SSL/SASL ───────────────────────────────────────
spring.kafka.properties.security.protocol=PLAINTEXT
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='admin' password='password';

# ─── Serialización Kafka ──────────────────────────────────
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hospital.waitinglist.model

# ─── Monitoreo / Actuator ─────────────────────────────────
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,resilience4j